<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Labs - Jacobian Sandbox</title>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/MathJax.js?config=TeX-MML-AM_CHTML"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0b132b; color: #f4f6f9; line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

/* HEADER */
header { background: linear-gradient(135deg, #1c2541, #3a506b); color: white; padding: 15px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 200; }
.header-container { display: flex; justify-content: space-between; align-items: center; }
.logo-section { display: flex; align-items: center; gap: 25px; }
.pcce-logo-container { display: flex; align-items: center; gap: 15px; padding-right: 25px; border-right: 2px solid rgba(255,255,255,0.2); }
.pcce-logo-img { width: 60px; height: 60px; object-fit: contain; border-radius: 8px; background: white; padding: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
.pcce-logo-text .main { font-size: 16px; font-weight: 700; line-height: 1.2; color: #6fffe9; }
.pcce-logo-text .sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.virtual-labs-logo h1 { font-size: 22px; font-weight: 600; color: #ffffff; }
.virtual-labs-logo span { color: #5bc0be; }

/* HOME GRID */
.home-page { padding: 36px 0 60px; }
.home-title { margin-bottom: 28px; }
.home-title h2 { font-size: 26px; color: #6fffe9; font-weight: 700; margin-bottom: 4px; }
.home-title p { color: #a5a1b2; font-size: 14px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 25px; }
.home-card { background: #1c2541; border-radius: 12px; padding: 26px 18px; text-align: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid transparent; transition: all 0.25s ease; }
.home-card:hover { transform: translateY(-5px); box-shadow: 0 10px 28px rgba(111,255,233,0.15); border-color: #5bc0be; }
.home-card .card-icon { width: 58px; height: 58px; border-radius: 14px; background: linear-gradient(135deg, #5bc0be, #3a506b); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
.home-card h3 { font-size: 16px; color: #ffffff; margin-bottom: 5px; font-weight: 600; }
.home-card p { font-size: 13px; color: #a5a1b2; }
.card-status { margin-top: 12px; font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 20px; display: inline-block; }
.status-done { background: #1b4332; color: #52b788; }
.status-not { background: #2a2f4e; color: #a5a1b2; }

/* MODAL OVERLAYS */
.modal-overlay { position: fixed; inset: 0; background: rgba(11, 19, 43, 0.85); z-index: 500; display: none; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
.modal-overlay.open { display: flex; }
.modal-box { background: #1c2541; border-radius: 14px; width: 100%; max-width: 900px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: modalIn 0.3s ease; margin: auto; border: 1px solid #3a506b; }
@keyframes modalIn { from { opacity: 0; transform: translateY(-24px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 26px; border-bottom: 1px solid #3a506b; position: sticky; top: 0; background: #1c2541; border-radius: 14px 14px 0 0; z-index: 10; }
.modal-header h2 { font-size: 20px; color: #6fffe9; display: flex; align-items: center; gap: 10px; }
.back-home-btn { padding: 8px 16px; background: #3a506b; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; color: white; font-weight: 600; transition: all 0.2s; }
.back-home-btn:hover { background: #5bc0be; color: #0b132b; }
.modal-body { padding: 26px; color: #f4f6f9; }

/* CONTENT & BOXES */
.aim-box { background: rgba(91, 192, 190, 0.1); border-left: 5px solid #5bc0be; border-radius: 8px; padding: 22px; margin-bottom: 18px; }
.theory-block { margin-bottom: 26px; }
.theory-block h3 { color: #6fffe9; font-size: 18px; margin-bottom: 12px; border-left: 4px solid #5bc0be; padding-left: 12px; }
.formula-box { background: #0b132b; color: #6fffe9; font-family: 'Courier New', monospace; padding: 16px 22px; border-radius: 8px; font-size: 15px; margin: 14px 0; white-space: pre-wrap; border: 1px solid #3a506b; text-align: center; }

/* SIMULATOR LAYOUT */
.sim-wrap { display: flex; flex-direction: column; gap: 20px; }
.sim-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.sim-field label { display: block; font-size: 13px; color: #5bc0be; margin-bottom: 5px; font-weight: 600; }
.sim-field input { width: 100%; padding: 11px 14px; border: 1px solid #3a506b; border-radius: 8px; font-size: 14px; color: #ffffff; background: #0b132b; transition: all 0.2s; }
.sim-field input:focus { outline: none; border-color: #6fffe9; box-shadow: 0 0 8px rgba(111,255,233,0.2); }
.sim-hint { font-size: 11px; color: #a5a1b2; margin-top: 4px; }
.examples-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; align-items: center; }
.examples-row span { font-size: 13px; color: #5bc0be; font-weight: bold; }
.ex-btn { font-size: 11px; padding: 5px 12px; border: 1px solid #3a506b; border-radius: 20px; background: #1c2541; color: #6fffe9; cursor: pointer; transition: all 0.2s; }
.ex-btn:hover { background: #5bc0be; color: #0b132b; }
.sim-btn { background: linear-gradient(135deg, #5bc0be, #3a506b); color: white; border: none; padding: 12px 30px; font-size: 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-weight: 600; margin-top: 10px; width: fit-content; }
.sim-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(111,255,233,0.3); }

/* LIVE RESULTS BOX */
.result-box { border-radius: 8px; padding: 22px; border: 1px solid #3a506b; background: #0b132b; display: none; margin-top: 18px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
.step-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #3a506b; }
.step-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.step-label { font-size: 12px; font-weight: 700; color: #5bc0be; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.step-val { font-size: 15px; color: #ffffff; line-height: 1.7; }
.step-val code { background: #1c2541; color: #6fffe9; padding: 3px 8px; border-radius: 4px; font-family: monospace; }
.matrix-display { display: inline-block; border-left: 2px solid white; border-right: 2px solid white; padding: 0 10px; margin: 10px 0; text-align: center; vertical-align: middle; }

footer { margin-top: 50px; padding: 20px 0; text-align: center; color: #a5a1b2; font-size: 13px; border-top: 1px solid #3a506b; }
.footer-logo { font-weight: bold; color: #6fffe9; }

@media(max-width:768px){
  .sim-controls { grid-template-columns: 1fr; }
  .header-container { flex-direction: column; gap: 15px; text-align: center; }
  .pcce-logo-container { border: none; padding: 0; }
}
</style>
</head>

        <div class="pcce-logo-text">
          <div class="main">APPLIED SCIENCES &amp; HUMANITIES</div>
          <div class="sub">Pimpri Chinchwad College of Engineering</div>
        </div>
      </div>
      <div class="virtual-labs-logo">
        <h1>Virtual <span>Labs</span></h1>
      </div>
    </div>
  </div>
</header>

    <h2>Jacobian Differential Calculus Sandbox</h2>
    <p>Explore partial derivatives, transformations, and determinants dynamically.</p>
